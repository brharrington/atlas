<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atlas Stack Language Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 8px 16px;
      background: #2d2d2d;
      border-bottom: 1px solid #404040;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 14px; font-weight: 500; color: #ccc; }
    #status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
    }
    #status.connected { background: #2ea04350; color: #4ec96b; }
    #status.disconnected { background: #f4474750; color: #f44747; }
    #editor-container {
      flex: 1;
      min-height: 120px;
      max-height: 200px;
    }
    #panels {
      flex: 2;
      display: flex;
      gap: 1px;
      background: #404040;
      overflow: hidden;
    }
    .panel {
      flex: 1;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 6px 12px;
      background: #2d2d2d;
      font-size: 12px;
      font-weight: 500;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #404040;
    }
    .panel-body {
      flex: 1;
      padding: 8px 12px;
      overflow: auto;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    #diagnostics-panel .diagnostic { padding: 2px 0; }
    #diagnostics-panel .error { color: #f44747; }
    #diagnostics-panel .warning { color: #cca700; }
    #diagnostics-panel .info { color: #3794ff; }
    #diagnostics-panel .none { color: #666; font-style: italic; }
    #completions-panel .item { padding: 1px 0; color: #9cdcfe; }
    #cursor-panel .token-info { padding: 2px 0; }
    #cursor-panel .token-value { color: #ce9178; }
    #cursor-panel .token-type { color: #4ec5d4; }
    #cursor-panel .token-range { color: #888; }
    #cursor-panel .none { color: #666; font-style: italic; }
    /* LSP semantic token colors applied via decorations */
    .atlas-token-word { color: #DCDCAA !important; }
    .atlas-token-string { color: #CE9178 !important; }
    .atlas-token-number { color: #B5CEA8 !important; }
    .atlas-token-paren { color: #D4D4D4 !important; }
    .atlas-token-unknown { color: #F44747 !important; }
    .atlas-token-comment { color: #6A9955 !important; font-style: italic; }
    #log-panel .entry { padding: 1px 0; color: #888; font-size: 11px; }
    #log-panel .entry.send { color: #6a9955; }
    #log-panel .entry.recv { color: #569cd6; }
  </style>
</head>
<body>
  <header>
    <h1>Atlas Stack Language</h1>
    <span id="status" class="disconnected">disconnected</span>
  </header>
  <div id="editor-container"></div>
  <div id="panels">
    <div class="panel" id="diagnostics-panel">
      <div class="panel-header">Diagnostics</div>
      <div class="panel-body" id="diagnostics-body"></div>
    </div>
    <div class="panel" id="completions-panel">
      <div class="panel-header">Completions</div>
      <div class="panel-body" id="completions-body"></div>
    </div>
    <div class="panel" id="cursor-panel">
      <div class="panel-header">Cursor Token</div>
      <div class="panel-body" id="cursor-body">
        <div class="none">Move cursor to inspect tokens</div>
      </div>
    </div>
    <div class="panel" id="log-panel">
      <div class="panel-header">LSP Log</div>
      <div class="panel-body" id="log-body"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>
  <script>
    require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs' } });

    require(['vs/editor/editor.main'], function () {

      // --- LSP Client over WebSocket ---

      const DOC_URI = 'atlas://expression';
      let ws = null;
      let requestId = 0;
      let docVersion = 0;
      let initialized = false;
      const pendingRequests = new Map();

      function lspLog(direction, msg) {
        const el = document.getElementById('log-body');
        const div = document.createElement('div');
        div.className = 'entry ' + direction;
        const prefix = direction === 'send' ? '>>>' : '<<<';
        const text = typeof msg === 'string' ? msg : JSON.stringify(msg);
        // Truncate long messages for display
        div.textContent = prefix + ' ' + (text.length > 200 ? text.substring(0, 200) + '...' : text);
        el.appendChild(div);
        el.scrollTop = el.scrollHeight;
      }

      function sendRequest(method, params) {
        const id = ++requestId;
        const msg = { jsonrpc: '2.0', id, method, params };
        lspLog('send', msg);
        ws.send(JSON.stringify(msg));
        return new Promise((resolve, reject) => {
          pendingRequests.set(id, { resolve, reject });
        });
      }

      function sendNotification(method, params) {
        const msg = { jsonrpc: '2.0', method, params };
        lspLog('send', msg);
        ws.send(JSON.stringify(msg));
      }

      function connectLsp() {
        const wsUrl = 'ws://' + window.location.hostname + ':7102';
        ws = new WebSocket(wsUrl);

        ws.onopen = async () => {
          document.getElementById('status').textContent = 'connected';
          document.getElementById('status').className = 'connected';

          // LSP initialize handshake
          const initResult = await sendRequest('initialize', {
            processId: null,
            capabilities: {
              textDocument: {
                completion: { completionItem: { snippetSupport: false } },
                semanticTokens: { requests: { full: true } },
                publishDiagnostics: {}
              }
            },
            rootUri: null
          });
          lspLog('recv', 'Capabilities: ' + JSON.stringify(initResult.capabilities || {}));

          sendNotification('initialized', {});
          initialized = true;

          // Open the document
          sendNotification('textDocument/didOpen', {
            textDocument: {
              uri: DOC_URI,
              languageId: 'atlas',
              version: ++docVersion,
              text: editor.getValue()
            }
          });

          // Request initial semantic tokens, completions, and code actions
          requestSemanticTokens();
          requestCompletions();
        };

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          lspLog('recv', msg);

          // Handle response to a request
          if (msg.id !== undefined && pendingRequests.has(msg.id)) {
            const { resolve } = pendingRequests.get(msg.id);
            pendingRequests.delete(msg.id);
            resolve(msg.result);
            return;
          }

          // Handle server notifications
          if (msg.method === 'textDocument/publishDiagnostics') {
            handleDiagnostics(msg.params);
          }
        };

        ws.onclose = () => {
          initialized = false;
          document.getElementById('status').textContent = 'disconnected';
          document.getElementById('status').className = 'disconnected';
          // Reconnect after a delay
          setTimeout(connectLsp, 3000);
        };

        ws.onerror = () => {};
      }

      // --- Register Atlas language ---
      monaco.languages.register({ id: 'atlas' });

      monaco.editor.defineTheme('atlas-dark', {
        base: 'vs-dark',
        inherit: true,
        rules: [],
        colors: {}
      });

      const editor = monaco.editor.create(document.getElementById('editor-container'), {
        value: 'a,b,:swap,:dup',
        language: 'atlas',
        theme: 'atlas-dark',
        minimap: { enabled: false },
        lineNumbers: 'off',
        glyphMargin: false,
        folding: false,
        scrollBeyondLastLine: false,
        renderLineHighlight: 'none',
        overviewRulerBorder: false,
        fontSize: 14,
        padding: { top: 8, bottom: 8 },
        wordWrap: 'on',
      });

      // --- Send document changes via LSP ---

      let changeTimer = null;
      editor.onDidChangeModelContent(() => {
        if (changeTimer) clearTimeout(changeTimer);
        changeTimer = setTimeout(() => {
          if (!initialized) return;
          sendNotification('textDocument/didChange', {
            textDocument: { uri: DOC_URI, version: ++docVersion },
            contentChanges: [{ text: editor.getValue() }]
          });
          requestSemanticTokens();
          requestCompletions();
        }, 150);
      });

      // --- Semantic tokens ---

      async function requestSemanticTokens() {
        if (!initialized) return;
        try {
          const result = await sendRequest('textDocument/semanticTokens/full', {
            textDocument: { uri: DOC_URI }
          });
          if (result && result.data) {
            applySemanticTokens(result.data);
          }
        } catch (e) {
          // ignore
        }
      }

      // Token type names matching AtlasTokenTypes indices
      const tokenTypeNames = ['Word', 'String', 'Number', 'Parenthesis', 'UnknownWord', 'Comment'];
      let decodedTokens = []; // [{start, length, end, typeName, typeIndex}]

      // CSS classes for each token type index (matching AtlasTokenTypes)
      const tokenCssClasses = [
        'atlas-token-word',     // 0: Word
        'atlas-token-string',   // 1: String
        'atlas-token-number',   // 2: Number
        'atlas-token-paren',    // 3: Parenthesis
        'atlas-token-unknown',  // 4: UnknownWord
        'atlas-token-comment',  // 5: Comment
      ];
      let decorationIds = [];

      function applySemanticTokens(data) {
        // Decode for cursor token panel
        decodedTokens = [];
        let pos = 0;
        for (let i = 0; i < data.length; i += 5) {
          pos += data[i + 1]; // deltaStart (deltaLine is always 0 for single-line)
          const length = data[i + 2];
          const typeIndex = data[i + 3];
          decodedTokens.push({
            start: pos,
            length: length,
            end: pos + length,
            typeIndex: typeIndex,
            typeName: tokenTypeNames[typeIndex] || 'Unknown'
          });
        }
        updateCursorToken();

        // Apply decorations to the editor using LSP semantic tokens
        const model = editor.getModel();
        const decorations = decodedTokens.map(t => {
          const startPos = model.getPositionAt(t.start);
          const endPos = model.getPositionAt(t.end);
          return {
            range: new monaco.Range(
              startPos.lineNumber, startPos.column,
              endPos.lineNumber, endPos.column
            ),
            options: {
              inlineClassName: tokenCssClasses[t.typeIndex] || ''
            }
          };
        });
        decorationIds = editor.deltaDecorations(decorationIds, decorations);
      }

      function updateCursorToken() {
        const el = document.getElementById('cursor-body');
        const pos = editor.getPosition();
        const model = editor.getModel();
        // Compute absolute offset: sum of all preceding line lengths + column on current line
        let offset = 0;
        for (let line = 1; line < pos.lineNumber; line++) {
          offset += model.getLineLength(line) + model.getEOL().length;
        }
        offset += pos.column - 1;
        const text = model.getValue();

        // Find token at cursor position
        const token = decodedTokens.find(t => offset >= t.start && offset < t.end);
        if (!token) {
          // Check if cursor is on a comma or whitespace
          const ch = offset < text.length ? text[offset] : '';
          el.innerHTML = `<div class="token-info">` +
            `<div class="token-range">Ln ${pos.lineNumber} Col ${pos.column} &nbsp; Offset: ${offset}</div>` +
            `<div class="none">No token at cursor` +
            (ch ? ` (char: '${escapeHtml(ch)}')` : '') +
            `</div></div>`;
          return;
        }

        const value = text.substring(token.start, token.end);
        el.innerHTML = `<div class="token-info">` +
          `<div class="token-range">Ln ${pos.lineNumber} Col ${pos.column} &nbsp; Offset: ${offset} &nbsp; Range: [${token.start}, ${token.end})</div>` +
          `<div>Value: <span class="token-value">${escapeHtml(value)}</span></div>` +
          `<div>Type: <span class="token-type">${token.typeName}</span> (${token.typeIndex})</div>` +
          `</div>`;
      }

      // --- Diagnostics ---

      function handleDiagnostics(params) {
        if (params.uri !== DOC_URI) return;
        const diagnostics = params.diagnostics || [];

        // Update Monaco markers
        const markers = diagnostics.map(d => ({
          severity: d.severity === 1
            ? monaco.MarkerSeverity.Error
            : d.severity === 2
            ? monaco.MarkerSeverity.Warning
            : monaco.MarkerSeverity.Info,
          startLineNumber: d.range.start.line + 1,
          startColumn: d.range.start.character + 1,
          endLineNumber: d.range.end.line + 1,
          endColumn: d.range.end.character + 1,
          message: d.message,
        }));
        monaco.editor.setModelMarkers(editor.getModel(), 'atlas', markers);

        // Update diagnostics panel
        const el = document.getElementById('diagnostics-body');
        if (diagnostics.length === 0) {
          el.innerHTML = '<div class="none">No issues</div>';
          return;
        }
        el.innerHTML = diagnostics.map(d => {
          const sev = d.severity === 1 ? 'error' : d.severity === 2 ? 'warning' : 'info';
          const range = `${d.range.start.character}-${d.range.end.character}`;
          return `<div class="diagnostic ${sev}">[${range}] ${escapeHtml(d.message)}</div>`;
        }).join('');
      }

      // --- Completions ---

      async function requestCompletions() {
        if (!initialized) return;
        try {
          const pos = editor.getPosition();
          const result = await sendRequest('textDocument/completion', {
            textDocument: { uri: DOC_URI },
            position: { line: pos.lineNumber - 1, character: pos.column - 1 }
          });
          const items = result ? (result.items || result) : [];
          renderCompletions(Array.isArray(items) ? items : []);
        } catch (e) {
          // ignore
        }
      }

      function renderCompletions(items) {
        const el = document.getElementById('completions-body');
        if (items.length === 0) {
          el.innerHTML = '<div class="none" style="color:#666;font-style:italic">No completions</div>';
          return;
        }
        el.innerHTML = items.slice(0, 30).map(item =>
          `<div class="item">${escapeHtml(item.label)}` +
          (item.detail ? ` <span style="color:#666">${escapeHtml(item.detail)}</span>` : '') +
          `</div>`
        ).join('');
        if (items.length > 30) {
          el.innerHTML += `<div class="item" style="color:#666">... and ${items.length - 30} more</div>`;
        }
      }

      // --- Go to Definition ---

      monaco.languages.registerDefinitionProvider('atlas', {
        provideDefinition: async function (model, position) {
          if (!initialized) return null;
          try {
            var result = await sendRequest('textDocument/definition', {
              textDocument: { uri: DOC_URI },
              position: { line: position.lineNumber - 1, character: position.column - 1 }
            });
            if (!result || result.length === 0) return null;
            var loc = result[0];
            return {
              uri: model.uri,
              range: new monaco.Range(
                loc.range.start.line + 1, loc.range.start.character + 1,
                loc.range.end.line + 1, loc.range.end.character + 1
              )
            };
          } catch (e) {
            return null;
          }
        }
      });

      // --- Hover ---

      monaco.languages.registerHoverProvider('atlas', {
        provideHover: async function (model, position) {
          if (!initialized) return null;
          try {
            const result = await sendRequest('textDocument/hover', {
              textDocument: { uri: DOC_URI },
              position: { line: position.lineNumber - 1, character: position.column - 1 }
            });
            if (!result || !result.contents) return null;
            var value = typeof result.contents === 'string'
              ? result.contents
              : result.contents.value || '';
            return { contents: [{ value: value }] };
          } catch (e) {
            return null;
          }
        }
      });

      // --- Code Actions (via Monaco lightbulb / Cmd+.) ---

      monaco.languages.registerCodeActionProvider('atlas', {
        provideCodeActions: async function (model, range, context, token) {
          if (!initialized) return { actions: [], dispose: function () {} };
          try {
            const text = model.getValue();
            const lastPos = model.getPositionAt(text.length);
            const result = await sendRequest('textDocument/codeAction', {
              textDocument: { uri: DOC_URI },
              range: {
                start: { line: 0, character: 0 },
                end: { line: lastPos.lineNumber - 1, character: lastPos.column - 1 }
              },
              context: { diagnostics: [] }
            });
            const lspActions = result || [];
            const actions = lspActions.map(function (item) {
              const action = item.right || item;
              const workspaceEdits = [];
              const changes = action.edit && action.edit.changes;
              if (changes && changes[DOC_URI]) {
                changes[DOC_URI].forEach(function (edit) {
                  workspaceEdits.push({
                    resource: model.uri,
                    textEdit: {
                      range: new monaco.Range(
                        edit.range.start.line + 1, edit.range.start.character + 1,
                        edit.range.end.line + 1, edit.range.end.character + 1
                      ),
                      text: edit.newText
                    }
                  });
                });
              }
              return {
                title: action.title,
                kind: 'refactor.rewrite',
                edit: { edits: workspaceEdits }
              };
            });
            return { actions: actions, dispose: function () {} };
          } catch (e) {
            return { actions: [], dispose: function () {} };
          }
        }
      });

      function escapeHtml(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      editor.onDidChangeCursorPosition(() => {
        updateCursorToken();
        requestCompletions();
      });

      window.addEventListener('resize', () => editor.layout());

      // Start connection
      connectLsp();
    });
  </script>
</body>
</html>
